name: intaris
version: 0.1.0
description: >-
  Intaris guardrails — evaluates every tool call through Intaris's safety
  pipeline before allowing execution. Wraps all registered tools with
  evaluation guards, forwards reasoning context, manages sessions, and
  optionally proxies MCP tools.
author: Filip Pytloun
provides_hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
  - post_llm_call
  - on_session_start
  - on_session_end
requires_env:
  - INTARIS_API_KEY
