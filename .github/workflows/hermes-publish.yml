name: Publish Hermes Plugin to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  hermes-build:
    runs-on: ubuntu-latest
    # Only build when the release tag starts with "hermes-v"
    if: startsWith(github.event.release.tag_name, 'hermes-v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        working-directory: integrations/hermes
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-dists
          path: integrations/hermes/dist/

  hermes-publish:
    runs-on: ubuntu-latest
    needs:
      - hermes-build
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    environment:
      name: pypi

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: hermes-release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
