<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>intaris</title>
  <link rel="stylesheet" href="/ui/css/app.css">
  <script src="/ui/js/api.js"></script>
  <script src="/ui/js/app.js"></script>
  <script src="/ui/js/dashboard.js"></script>
  <script src="/ui/js/sessions.js"></script>
  <script src="/ui/js/audit.js"></script>
  <script src="/ui/js/approvals.js"></script>
  <script src="/ui/js/settings.js"></script>
  <script src="/ui/vendor/alpine.min.js" defer></script>
</head>
<body class="min-h-screen" x-data x-init="$store.auth.init()">

  <!-- ── Loading Splash ──────────────────────────────────────── -->
  <div x-show="$store.auth.loading" class="fixed inset-0 flex items-center justify-center bg-brand-bg z-50">
    <div class="text-center">
      <div class="text-3xl font-bold text-brand-accent mb-3">intaris</div>
      <div class="text-sm text-secondary">Loading...</div>
    </div>
  </div>

  <!-- ── Login Screen ────────────────────────────────────────── -->
  <div x-show="!$store.auth.loading && !$store.auth.authenticated" x-cloak
       class="fixed inset-0 flex items-center justify-center bg-brand-bg z-40">
    <div class="card w-full max-w-sm mx-4" x-data="{ key: '', userId: '' }">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-brand-accent mb-1">intaris</h1>
        <p class="text-sm text-secondary">Guardrails Management UI</p>
      </div>

      <form @submit.prevent="$store.auth.login(key, userId)" class="space-y-4">
        <div>
          <label class="block text-sm text-secondary mb-1.5">API Key</label>
          <input type="password" x-model="key" placeholder="Enter your API key"
                 class="input" autofocus>
        </div>

        <div>
          <label class="block text-sm text-secondary mb-1.5">User ID <span class="text-muted">(optional if key is bound)</span></label>
          <input type="text" x-model="userId" placeholder="e.g. your-username"
                 class="input">
        </div>

        <div x-show="$store.auth.error" x-text="$store.auth.error"
             class="text-sm text-red-400 bg-red-500/10 rounded-lg px-3 py-2"></div>

        <button type="submit" class="btn-primary w-full"
                :disabled="(!key && !userId) || $store.auth.loading">
          <span x-show="!$store.auth.loading">Sign In</span>
          <span x-show="$store.auth.loading">Authenticating...</span>
        </button>
      </form>

      <p class="text-xs text-muted text-center mt-6">
        Enter API key and/or User ID to authenticate
      </p>
    </div>
  </div>

  <!-- ── Main Application ────────────────────────────────────── -->
  <div x-show="!$store.auth.loading && $store.auth.authenticated" x-cloak
       class="min-h-screen flex flex-col">

    <!-- ── Top Navigation ──────────────────────────────────── -->
    <nav class="bg-brand-surface border-b border-brand-border sticky top-0 z-30">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">
          <!-- Brand -->
          <div class="flex items-center gap-2">
            <span class="text-xl font-bold text-brand-accent">intaris</span>
          </div>

          <!-- Tab Navigation -->
          <div class="flex items-center gap-1">
            <template x-for="tab in [
              { id: 'dashboard', label: 'Dashboard' },
              { id: 'sessions', label: 'Sessions' },
              { id: 'audit', label: 'Audit' },
              { id: 'approvals', label: 'Approvals' },
              { id: 'settings', label: 'Settings' },
            ]">
              <button @click="$store.nav.setTab(tab.id)"
                      :class="$store.nav.activeTab === tab.id ? 'tab-btn tab-btn-active' : 'tab-btn'"
                      x-text="tab.label"></button>
            </template>
          </div>

          <!-- User & Logout -->
          <div class="flex items-center gap-3">
            <!-- User Switcher (only for wildcard keys) -->
            <template x-if="$store.auth.identity?.can_switch_user && $store.auth.users.length > 1">
              <select class="select text-sm py-1.5"
                      :value="$store.auth.selectedUser"
                      @change="$store.auth.switchUser($event.target.value)">
                <template x-for="u in $store.auth.users" :key="u">
                  <option :value="u" x-text="u" :selected="u === $store.auth.selectedUser"></option>
                </template>
              </select>
            </template>

            <span class="text-sm text-secondary" x-text="$store.auth.selectedUser || $store.auth.identity?.user_id || ''"></span>

            <button @click="$store.auth.logout()" class="btn-ghost text-sm">Logout</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── Tab Content ─────────────────────────────────────── -->
    <main class="flex-1 max-w-[1600px] mx-auto w-full px-4 sm:px-6 py-6">

      <!-- Dashboard Tab -->
      <div x-show="$store.nav.activeTab === 'dashboard'" x-data="dashboardTab()" x-init="init()">
        <div x-show="loading && !initialized" class="text-center py-12 text-secondary">Loading dashboard...</div>

        <template x-if="stats">
          <div>
            <!-- Stat Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <div class="stat-card">
                <div class="stat-value" x-text="stats.total_sessions"></div>
                <div class="stat-label">Sessions</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" x-text="stats.total_evaluations"></div>
                <div class="stat-label">Evaluations</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" x-text="approvalRate"></div>
                <div class="stat-label">Approval Rate</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" x-text="stats.pending_approvals"></div>
                <div class="stat-label">Pending Approvals</div>
              </div>
            </div>

            <!-- Decision Distribution -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div class="card">
                <h3 class="text-sm font-medium text-secondary mb-3">Decision Distribution</h3>
                <div class="flex gap-4">
                  <div class="flex items-center gap-2">
                    <span class="badge badge-approve">approve</span>
                    <span class="text-sm" x-text="stats.decisions.approve || 0"></span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="badge badge-deny">deny</span>
                    <span class="text-sm" x-text="stats.decisions.deny || 0"></span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="badge badge-escalate">escalate</span>
                    <span class="text-sm" x-text="stats.decisions.escalate || 0"></span>
                  </div>
                </div>
              </div>
              <div class="card">
                <h3 class="text-sm font-medium text-secondary mb-3">Performance</h3>
                <div class="flex gap-6">
                  <div>
                    <div class="text-lg font-bold" x-text="avgLatency"></div>
                    <div class="text-xs text-muted">Avg Latency</div>
                  </div>
                  <div>
                    <div class="text-lg font-bold" x-text="(stats.sessions_by_status?.active || 0)"></div>
                    <div class="text-xs text-muted">Active Sessions</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Recent Activity -->
            <div class="card">
              <h3 class="text-sm font-medium text-secondary mb-3">Recent Activity</h3>
              <div x-show="recentActivity.length === 0" class="text-sm text-muted py-4 text-center">No activity yet</div>
              <div class="space-y-2">
                <template x-for="r in recentActivity" :key="r.call_id">
                  <div class="flex items-center justify-between py-2 border-b border-brand-border last:border-0">
                    <div class="flex items-center gap-3">
                      <span :class="decisionBadgeClass(r.decision)" x-text="r.decision"></span>
                      <span class="text-sm font-mono" x-text="r.tool || r.record_type"></span>
                      <span class="text-xs text-muted" x-text="r.session_id"></span>
                    </div>
                    <div class="flex items-center gap-3">
                      <span :class="riskBadgeClass(r.risk)" x-text="r.risk" x-show="r.risk"></span>
                      <span class="text-xs text-muted" x-text="formatTime(r.timestamp)"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Sessions Tab -->
      <div x-show="$store.nav.activeTab === 'sessions'" x-data="sessionsTab()" x-init="init()">
        <!-- Status Filter -->
        <div class="flex items-center gap-2 mb-4">
          <button @click="filterByStatus('')"
                  :class="statusFilter === '' ? 'btn-primary text-sm' : 'btn-secondary text-sm'">All</button>
          <template x-for="s in ['active', 'completed', 'suspended', 'terminated']">
            <button @click="filterByStatus(s)"
                    :class="statusFilter === s ? 'btn-primary text-sm' : 'btn-secondary text-sm'"
                    x-text="s"></button>
          </template>
        </div>

        <div x-show="loading && !initialized" class="text-center py-12 text-secondary">Loading sessions...</div>
        <div x-show="!loading && sessions.length === 0" class="text-center py-12 text-muted">No sessions found</div>

        <!-- Session List -->
        <div class="space-y-3">
          <template x-for="session in sessions" :key="session.session_id">
            <div class="card cursor-pointer" @click="toggleExpand(session)">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span :class="statusBadgeClass(session.status)" x-text="session.status"></span>
                  <span class="font-mono text-sm text-brand-accent" x-text="session.session_id"></span>
                </div>
                <div class="flex items-center gap-4 text-sm text-muted">
                  <span x-text="session.total_calls + ' calls'"></span>
                  <span x-text="formatTime(session.created_at)"></span>
                </div>
              </div>
              <div class="mt-2 text-sm text-secondary" x-text="truncate(session.intention, 120)"></div>

              <!-- Expanded Detail -->
              <div x-show="expandedId === session.session_id" x-cloak class="mt-4 pt-4 border-t border-brand-border">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                  <div class="text-center">
                    <div class="text-lg font-bold text-emerald-400" x-text="session.approved_count"></div>
                    <div class="text-xs text-muted">Approved</div>
                  </div>
                  <div class="text-center">
                    <div class="text-lg font-bold text-red-400" x-text="session.denied_count"></div>
                    <div class="text-xs text-muted">Denied</div>
                  </div>
                  <div class="text-center">
                    <div class="text-lg font-bold text-amber-400" x-text="session.escalated_count"></div>
                    <div class="text-xs text-muted">Escalated</div>
                  </div>
                  <div class="text-center">
                    <div class="text-lg font-bold" x-text="session.total_calls"></div>
                    <div class="text-xs text-muted">Total</div>
                  </div>
                </div>

                <!-- Intention -->
                <div class="mb-3">
                  <div class="text-xs text-muted mb-1">Intention</div>
                  <div class="text-sm" x-text="session.intention"></div>
                </div>

                <!-- Policy (if present) -->
                <template x-if="session.policy">
                  <div class="mb-3">
                    <div class="text-xs text-muted mb-1">Policy</div>
                    <pre class="text-xs bg-brand-elevated rounded p-2 overflow-x-auto" x-text="JSON.stringify(session.policy, null, 2)"></pre>
                  </div>
                </template>

                <!-- Status Actions -->
                <div class="flex gap-2 mb-4">
                  <template x-if="session.status === 'active'">
                    <div class="flex gap-2">
                      <button @click.stop="updateStatus(session.session_id, 'suspended')" class="btn-secondary text-sm">Suspend</button>
                      <button @click.stop="updateStatus(session.session_id, 'terminated')" class="btn-danger text-sm">Terminate</button>
                    </div>
                  </template>
                  <template x-if="session.status === 'suspended'">
                    <button @click.stop="updateStatus(session.session_id, 'active')" class="btn-success text-sm">Reactivate</button>
                  </template>
                </div>

                <!-- Session Audit Feed -->
                <div class="mt-3">
                  <div class="text-xs text-muted mb-2">Recent Evaluations</div>
                  <div x-show="sessionAudit.length === 0" class="text-sm text-muted">No evaluations yet</div>
                  <div class="space-y-1">
                    <template x-for="r in sessionAudit" :key="r.call_id">
                      <div class="flex items-center justify-between py-1.5 text-sm">
                        <div class="flex items-center gap-2">
                          <span :class="decisionBadgeClass(r.decision)" x-text="r.decision"></span>
                          <span class="font-mono text-xs" x-text="r.tool"></span>
                        </div>
                        <span class="text-xs text-muted" x-text="formatTime(r.timestamp)"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Pagination -->
        <div x-show="pages > 1" class="flex items-center justify-center gap-4 mt-6">
          <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-sm">Previous</button>
          <span class="text-sm text-muted" x-text="`Page ${page} of ${pages}`"></span>
          <button @click="nextPage()" :disabled="page >= pages" class="btn-secondary text-sm">Next</button>
        </div>
      </div>

      <!-- Audit Tab -->
      <div x-show="$store.nav.activeTab === 'audit'" x-data="auditTab()" x-init="init()">
        <!-- Filters -->
        <div class="card mb-4">
          <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <input x-model="filterSession" placeholder="Session ID" class="input text-sm">
            <input x-model="filterTool" placeholder="Tool" class="input text-sm">
            <select x-model="filterDecision" class="select text-sm">
              <option value="">All decisions</option>
              <option value="approve">approve</option>
              <option value="deny">deny</option>
              <option value="escalate">escalate</option>
            </select>
            <select x-model="filterRisk" class="select text-sm">
              <option value="">All risks</option>
              <option value="low">low</option>
              <option value="medium">medium</option>
              <option value="high">high</option>
              <option value="critical">critical</option>
            </select>
            <select x-model="filterPath" class="select text-sm">
              <option value="">All paths</option>
              <option value="fast">fast</option>
              <option value="critical">critical</option>
              <option value="llm">llm</option>
            </select>
          </div>
          <div class="flex gap-2 mt-3">
            <button @click="applyFilters()" class="btn-primary text-sm">Apply</button>
            <button @click="clearFilters()" class="btn-secondary text-sm">Clear</button>
            <span class="text-sm text-muted ml-auto" x-text="`${total} records`"></span>
          </div>
        </div>

        <div x-show="loading && !initialized" class="text-center py-12 text-secondary">Loading audit log...</div>
        <div x-show="!loading && records.length === 0" class="text-center py-12 text-muted">No audit records found</div>

        <!-- Audit Records -->
        <div class="space-y-2">
          <template x-for="r in records" :key="r.call_id">
            <div class="card cursor-pointer" @click="toggleExpand(r)">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span :class="decisionBadgeClass(r.decision)" x-text="r.decision"></span>
                  <span class="font-mono text-sm" x-text="r.tool || r.record_type"></span>
                  <span :class="riskBadgeClass(r.risk)" x-text="r.risk" x-show="r.risk"></span>
                  <span :class="pathBadgeClass(r.evaluation_path)" x-text="r.evaluation_path"></span>
                </div>
                <div class="flex items-center gap-3 text-xs text-muted">
                  <span x-text="r.session_id"></span>
                  <span x-text="formatTime(r.timestamp)"></span>
                  <span x-text="r.latency_ms + 'ms'"></span>
                </div>
              </div>

              <!-- Expanded Detail -->
              <div x-show="expandedId === r.call_id" x-cloak class="mt-4 pt-4 border-t border-brand-border">
                <!-- Reasoning -->
                <template x-if="expandedRecord?.reasoning">
                  <div class="mb-3">
                    <div class="text-xs text-muted mb-1">Reasoning</div>
                    <div class="text-sm bg-brand-elevated rounded p-3" x-text="expandedRecord.reasoning"></div>
                  </div>
                </template>

                <!-- Redacted Args -->
                <template x-if="expandedRecord?.args_redacted">
                  <div class="mb-3">
                    <div class="text-xs text-muted mb-1">Arguments (redacted)</div>
                    <pre class="text-xs bg-brand-elevated rounded p-3 overflow-x-auto" x-text="formatArgs(expandedRecord.args_redacted)"></pre>
                  </div>
                </template>

                <!-- Resolution (if escalated) -->
                <template x-if="expandedRecord?.user_decision">
                  <div class="mb-3">
                    <div class="text-xs text-muted mb-1">Resolution</div>
                    <div class="flex items-center gap-2">
                      <span :class="decisionBadgeClass(expandedRecord.user_decision)" x-text="expandedRecord.user_decision"></span>
                      <span class="text-sm" x-text="expandedRecord.user_note" x-show="expandedRecord.user_note"></span>
                      <span class="text-xs text-muted" x-text="formatTime(expandedRecord.resolved_at)"></span>
                    </div>
                  </div>
                </template>

                <!-- Metadata -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-muted">
                  <div>Call ID: <span class="font-mono" x-text="expandedRecord?.call_id"></span></div>
                  <div>Classification: <span x-text="expandedRecord?.classification"></span></div>
                  <div>Agent: <span x-text="expandedRecord?.agent_id || 'none'"></span></div>
                  <div>User: <span x-text="expandedRecord?.user_id"></span></div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Pagination -->
        <div x-show="pages > 1" class="flex items-center justify-center gap-4 mt-6">
          <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-sm">Previous</button>
          <span class="text-sm text-muted" x-text="`Page ${page} of ${pages}`"></span>
          <button @click="nextPage()" :disabled="page >= pages" class="btn-secondary text-sm">Next</button>
        </div>
      </div>

      <!-- Approvals Tab -->
      <div x-show="$store.nav.activeTab === 'approvals'" x-data="approvalsTab()" x-init="init()">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-medium">Pending Approvals</h2>
          <span class="badge badge-escalate" x-text="total + ' pending'" x-show="total > 0"></span>
        </div>

        <div x-show="loading" class="text-center py-12 text-secondary">Loading approvals...</div>
        <div x-show="!loading && pending.length === 0" class="text-center py-12 text-muted">No pending approvals</div>

        <div class="space-y-4">
          <template x-for="item in pending" :key="item.call_id">
            <div class="card">
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                  <span class="badge badge-escalate">escalate</span>
                  <span class="font-mono text-sm" x-text="item.tool"></span>
                  <span :class="riskBadgeClass(item.risk)" x-text="item.risk" x-show="item.risk"></span>
                </div>
                <div class="text-xs text-muted">
                  <span x-text="item.session_id"></span> &middot;
                  <span x-text="formatTime(item.timestamp)"></span>
                </div>
              </div>

              <!-- Reasoning -->
              <div class="text-sm bg-brand-elevated rounded p-3 mb-3" x-text="item.reasoning" x-show="item.reasoning"></div>

              <!-- Args Summary -->
              <div x-show="item.args_redacted" class="mb-3">
                <div class="text-xs text-muted mb-1">Arguments</div>
                <pre class="text-xs bg-brand-elevated rounded p-2 overflow-x-auto" x-text="formatArgs(item.args_redacted)"></pre>
              </div>

              <!-- Note + Actions -->
              <div class="flex items-end gap-3">
                <div class="flex-1">
                  <input type="text" :placeholder="'Optional note...'"
                         class="input text-sm"
                         x-model="noteText[item.call_id]">
                </div>
                <button @click="resolve(item.call_id, 'approve')"
                        :disabled="resolving[item.call_id]"
                        class="btn-success text-sm">Approve</button>
                <button @click="resolve(item.call_id, 'deny')"
                        :disabled="resolving[item.call_id]"
                        class="btn-danger text-sm">Deny</button>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Settings Tab -->
      <div x-show="$store.nav.activeTab === 'settings'" x-data="settingsTab()" x-init="init()">
        <div x-show="loading" class="text-center py-12 text-secondary">Loading settings...</div>

        <template x-if="config">
          <div class="space-y-4">
            <!-- LLM Configuration -->
            <div class="card">
              <h3 class="text-sm font-medium text-secondary mb-3">LLM Configuration</h3>
              <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                  <div class="text-xs text-muted">Model</div>
                  <div class="font-mono" x-text="config.llm.model"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Provider</div>
                  <div class="font-mono" x-text="config.llm.base_url"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Temperature</div>
                  <div x-text="config.llm.temperature"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Reasoning Effort</div>
                  <div x-text="config.llm.reasoning_effort || 'default'"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Timeout</div>
                  <div x-text="config.llm.timeout_ms + 'ms'"></div>
                </div>
              </div>
            </div>

            <!-- Server Configuration -->
            <div class="card">
              <h3 class="text-sm font-medium text-secondary mb-3">Server Configuration</h3>
              <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                  <div class="text-xs text-muted">Rate Limit</div>
                  <div x-text="config.rate_limit > 0 ? config.rate_limit + '/min per session' : 'Disabled'"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Webhook</div>
                  <div x-text="config.webhook_configured ? 'Configured' : 'Not configured (standalone mode)'"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Authentication</div>
                  <div x-text="config.auth_configured ? 'Enabled' : 'Disabled (dev mode)'"></div>
                </div>
                <div>
                  <div class="text-xs text-muted">Version</div>
                  <div class="font-mono" x-text="config.version"></div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

    </main>
  </div>

  <!-- ── Toast Notifications ─────────────────────────────────── -->
  <div class="fixed bottom-4 right-4 z-50 space-y-2" x-data>
    <template x-for="toast in $store.notify.toasts" :key="toast.id">
      <div :class="'toast toast-' + toast.type"
           x-text="toast.message"
           @click="$store.notify.remove(toast.id)"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"></div>
    </template>
  </div>

</body>
</html>
